<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tasks | Habitus</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="header">
        <div class="header-left">
            <h1 class="app-title">Habitus</h1>
            <button type="button" class="view-toggle-btn" id="view-toggle-btn" aria-label=""></button>
            <div class="header-datetime" id="header-datetime">
                <span class="header-today-pill" id="header-today-pill" data-i18n="weekCalendarToday">Hoje</span>
                <div class="header-datetime-text">
                    <span class="header-today-date" id="header-today-date" aria-live="polite"></span>
                    <time class="header-today-clock" id="header-today-clock" datetime="" aria-live="polite"></time>
                </div>
            </div>
        </div>
        <div class="header-center">
            <div class="header-search" role="search">
                <label class="header-search-inner" for="global-search-input">
                    <span class="header-search-icon" aria-hidden="true">🔍</span>
                    <input
                        type="search"
                        id="global-search-input"
                        class="header-search-input"
                        data-i18n-placeholder="globalSearchPlaceholder"
                        data-i18n-aria-label="globalSearchAriaLabel"
                        autocomplete="off"
                        spellcheck="false"
                    />
                </label>
            </div>
        </div>
        <div class="header-right">
            <select id="language-selector" class="language-selector">
                <option value="en">English</option>
                <option value="es">Español</option>
                <option value="zh">中文</option>
                <option value="ja">日本語</option>
                <option value="de">Deutsch</option>
                <option value="it">Italiano</option>
                <option value="pt_BR">Português BR</option>
                <option value="pt">Português PT</option>
                <option value="fr">Français</option>
            </select>
            <button class="today-overlay-toggle-btn" id="today-overlay-toggle-btn" type="button" title="Hoje">🕒</button>
            <button type="button" class="reminders-toggle-btn" id="reminders-toggle-btn" aria-pressed="false">🔕</button>
            <button class="export-btn" id="export-btn" title="Exportar">📋</button>
            <button class="import-btn" id="import-btn" title="Importar">📥</button>
            <input type="file" id="import-file" accept=".json" style="display: none;">
        </div>
    </div>

    <div class="today-overlay" id="today-overlay" style="display: none;" aria-label="Today timeline">
        <div class="today-overlay-header">
            <button type="button" class="today-overlay-close" id="today-overlay-close" aria-label="Close">×</button>
        </div>
        <div class="today-overlay-body">
            <div class="week-calendar-scroll today-overlay-scroll" id="today-overlay-root"></div>
        </div>
    </div>

    <div class="container">
        <nav class="mobile-view-tabs" id="mobile-view-tabs" role="tablist" hidden aria-label="">
            <button type="button" class="mobile-view-tab" role="tab" id="mobile-tab-dailies" data-mobile-tab="0" aria-selected="true"></button>
            <button type="button" class="mobile-view-tab" role="tab" id="mobile-tab-tasks" data-mobile-tab="1" aria-selected="false"></button>
            <button type="button" class="mobile-view-tab" role="tab" id="mobile-tab-calendar" data-mobile-tab="2" aria-selected="false"></button>
        </nav>
        <div class="tasks-container main-view-scroll-anchor" id="main-lists-view">
            <!-- Dailies Column -->
            <div class="tasks-column" id="mobile-panel-dailies">
                <div class="column-header">
                    <h2 id="dailies-title">Dailies <span class="count" id="dailies-count">(0)</span></h2>
                    <div class="column-header-right"></div>
                </div>
                <div class="tag-filters" id="dailies-tag-filters"></div>
                <div class="add-input-row">
                    <input type="text" class="add-input" id="add-daily-input" data-i18n-placeholder="addDaily" placeholder="Adicionar Diária">
                    <button class="add-btn" id="add-daily-btn">+</button>
                </div>
                <div class="tasks-list" id="dailies-list"></div>
                <div class="completed-section" id="dailies-completed-section" style="display: none;">
                    <div class="completed-header">
                        <button class="toggle-completed-btn" id="toggle-dailies-completed">
                            <span id="toggle-dailies-text">Mostrar concluídas</span>
                        </button>
                        <button class="delete-completed-btn" id="delete-dailies-completed">Deletar Concluídas</button>
                    </div>
                    <div class="completed-list" id="dailies-completed-list"></div>
                </div>
                <div class="scheduled-section" id="dailies-scheduled-section" style="display: none;">
                    <div class="scheduled-header">
                        <button class="toggle-scheduled-btn" id="toggle-dailies-scheduled">
                            <span id="toggle-dailies-scheduled-text">Mostrar agendadas</span>
                        </button>
                    </div>
                    <div class="scheduled-list" id="dailies-scheduled-list"></div>
                </div>
            </div>

            <!-- Tasks Column -->
            <div class="tasks-column" id="mobile-panel-tasks">
                <div class="column-header">
                    <h2 id="tasks-title">Tasks <span class="count" id="tasks-count">(0)</span></h2>
                    <div class="column-header-right">
                        <div class="tasks-date-filter-row" id="tasks-date-filter-row" aria-label="Tasks date filter">
                            <button type="button" class="tasks-date-filter-btn is-active" data-filter="all" id="tasks-date-filter-all"></button>
                            <button type="button" class="tasks-date-filter-btn" data-filter="today" id="tasks-date-filter-today"></button>
                            <button type="button" class="tasks-date-filter-btn" data-filter="no_date" id="tasks-date-filter-no-date"></button>
                            <button type="button" class="tasks-date-filter-btn" data-filter="future" id="tasks-date-filter-future"></button>
                        </div>
                    </div>
                </div>
                <div class="tag-filters" id="tasks-tag-filters"></div>
                <div class="add-input-row">
                    <input type="text" class="add-input" id="add-task-input" data-i18n-placeholder="addTask" placeholder="Adicionar Tarefa">
                    <button class="add-btn" id="add-task-btn">+</button>
                </div>
                <div class="tasks-list" id="tasks-list"></div>
                <div class="completed-section" id="tasks-completed-section" style="display: none;">
                    <div class="completed-header">
                        <button class="toggle-completed-btn" id="toggle-tasks-completed">
                            <span id="toggle-tasks-text">Mostrar concluídas</span>
                        </button>
                        <button class="delete-completed-btn" id="delete-tasks-completed">Deletar Concluídas</button>
                    </div>
                    <div class="completed-list" id="tasks-completed-list"></div>
                </div>
            </div>
        </div>

        <section class="week-calendar-section main-view-scroll-anchor" id="week-calendar-section" aria-label="Calendar">
            <div class="week-calendar-toolbar">
                <div class="week-calendar-toolbar-left">
                    <h2 class="week-calendar-title" id="week-calendar-title">Semana</h2>
                    <span class="week-calendar-range" id="week-calendar-range"></span>
                </div>
                <div class="week-calendar-nav">
                    <button type="button" class="week-cal-nav-btn week-cal-view-toggle" id="week-cal-view-toggle" aria-pressed="false">Só hoje</button>
                    <button type="button" class="week-cal-nav-btn" id="week-cal-prev" aria-label="Previous week">‹</button>
                    <button type="button" class="week-cal-nav-btn week-cal-today-btn" id="week-cal-today" data-i18n="weekCalendarToday">Hoje</button>
                    <button type="button" class="week-cal-nav-btn" id="week-cal-next" aria-label="Next week">›</button>
                </div>
            </div>
            <div class="week-calendar-scroll" id="week-calendar-root"></div>
        </section>

        <section class="stats-section main-view-scroll-anchor" id="stats-section" aria-labelledby="stats-section-title">
            <h2 class="stats-section-title" id="stats-section-title" data-i18n="statsSectionTitle">Statistics</h2>
            <p class="stats-section-subtitle" id="stats-section-subtitle"></p>
            <div class="stats-grid" id="stats-grid"></div>
        </section>
    </div>

    <div class="footer">
        <p class="motivational-message" id="motivational-message">✨ Você consegue! ✨</p>
    </div>

    <!-- Pomodoro Timer Modal -->
    <div class="modal-overlay" id="pomodoro-modal" style="display: none;">
        <div class="modal-content">
            <div class="modal-header">
                <h3 id="pomodoro-task-title">Pomodoro Timer</h3>
                <button class="close-btn" id="close-pomodoro">×</button>
            </div>
            <div class="timer-display">
                <input type="text" id="timer-time" value="15:00" class="timer-time-input">
            </div>
            <div class="timer-progress">
                <div class="progress-bar" id="timer-progress-bar"></div>
            </div>
            <div class="timer-controls">
                <button class="timer-btn" id="timer-start">Iniciar</button>
                <button class="timer-btn" id="timer-pause" style="display: none;">Pausar</button>
                <button class="timer-btn" id="timer-resume" style="display: none;">Continuar</button>
                <button class="timer-btn" id="timer-reset">Reiniciar</button>
            </div>
            <div class="timer-settings">
                <label>
                    <span id="timer-duration-label">Duração (minutos):</span>
                    <input type="number" id="timer-duration" min="1" max="60" value="15">
                </label>
            </div>
        </div>
    </div>

    <!-- Task/Daily Modal -->
    <div class="modal-overlay" id="task-modal" style="display: none;">
        <div class="modal-content task-modal-content">
            <div class="modal-header">
                <h3 id="task-modal-title">Nova Task</h3>
                <button class="close-btn" id="close-task-modal">×</button>
            </div>
            <div class="modal-body">
                <div class="form-group">
                    <label id="task-title-label">Título *</label>
                    <input type="text" id="task-title-input" placeholder="Título da task" required>
                </div>
                <div class="form-group">
                    <label id="task-status-label">Status</label>
                    <select id="task-status-select">
                        <option value="pending">Pendente</option>
                        <option value="in_progress">Em Progresso</option>
                        <option value="done">Concluída</option>
                    </select>
                </div>
                <div class="form-group" id="task-priority-group">
                    <label id="task-priority-label">Prioridade</label>
                    <select id="task-priority-select">
                        <option value="">Nenhuma</option>
                        <option value="low">Baixa</option>
                        <option value="medium">Média</option>
                        <option value="high">Alta</option>
                    </select>
                </div>
                <div class="form-group" id="task-due-date-group">
                    <label id="task-due-date-label">Data de Vencimento</label>
                    <input type="date" id="task-due-date-input">
                </div>
                <div class="form-group" id="task-due-time-group">
                    <label id="task-due-time-label">Hora</label>
                    <input type="time" id="task-due-time-input" step="60">
                </div>
                <div class="form-group" id="task-duration-group">
                    <label id="task-duration-label" for="task-duration-input">Tempo no calendário (min)</label>
                    <input type="number" id="task-duration-input" min="15" max="480" step="15" value="30">
                </div>
                <div class="form-group" id="task-days-of-week-group" style="display: none;">
                    <label id="task-days-label">Dias da Semana</label>
                    <div class="days-checkboxes">
                        <label><input type="checkbox" value="monday" class="day-checkbox"> Seg</label>
                        <label><input type="checkbox" value="tuesday" class="day-checkbox"> Ter</label>
                        <label><input type="checkbox" value="wednesday" class="day-checkbox"> Qua</label>
                        <label><input type="checkbox" value="thursday" class="day-checkbox"> Qui</label>
                        <label><input type="checkbox" value="friday" class="day-checkbox"> Sex</label>
                        <label><input type="checkbox" value="saturday" class="day-checkbox"> Sáb</label>
                        <label><input type="checkbox" value="sunday" class="day-checkbox"> Dom</label>
                    </div>
                </div>
                <div class="form-group">
                    <label id="task-tags-label">Tags (separadas por vírgula)</label>
                    <input type="text" id="task-tags-input" placeholder="tag1, tag2, tag3">
                </div>
                <div class="form-group" id="task-subtasks-group">
                    <label id="task-subtasks-label">Subtasks</label>
                    <div id="subtasks-list"></div>
                    <button type="button" class="add-subtask-btn" id="add-subtask-btn">+ Adicionar Subtask</button>
                </div>
            </div>
            <div class="modal-footer">
                <button class="btn-secondary" id="cancel-task-btn">Cancelar</button>
                <button class="btn-secondary" id="delete-task-btn" style="display: none;">Deletar</button>
                <button class="btn-primary" id="save-task-btn">Salvar</button>
            </div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div class="toast" id="toast"></div>
    <div class="action-toast-stack" id="action-toast-stack" aria-live="polite" aria-relevant="additions"></div>

    <!-- Core Modules -->
    <script src="i18n.js"></script>
    <script src="js/data.js"></script>
    <script src="js/utils.js"></script>
    
    <!-- Feature Modules -->
    <script src="js/tasks.js"></script>
    <script src="js/subtasks.js"></script>
    <script src="js/filters.js"></script>
    <script src="js/drag-drop.js"></script>
    <script src="js/pomodoro.js"></script>
    <script src="js/export-import.js"></script>
    <script src="js/reminders.js"></script>
    <script src="js/stats.js"></script>
    
    <!-- UI Modules -->
    <script src="js/inline-edit.js"></script>
    <script src="js/keyboard-nav.js"></script>
    <script src="js/mobile-views.js"></script>
    <script src="js/week-calendar.js"></script>
    <script src="js/render.js"></script>
    <script src="js/modal.js"></script>
    
    <!-- Main App -->
    <script src="app.js"></script>
</body>
</html>
